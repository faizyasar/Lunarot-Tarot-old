<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunarot · Sacred Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── THE CURSED FONTS ── */
@font-face {
  font-family: 'IPAexMincho';
  src: url('fonts/ipaexm.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}

@font-face {
  font-family: 'Onryou';
  src: url('fonts/onryou.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}

:root {
  --void:#05040a; --parchment:#ede0c8; --gold:#c8a45a; --gold-dim:#6e5a30;
  --ash:#100e18; --cream:#ddd0b8; --ember:#8c2a2a;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--void);color:var(--parchment);font-family:'Cormorant Garamond',serif;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;scroll-behavior:smooth;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 50% -10%,rgba(100,40,160,.18) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 20% 80%,rgba(40,10,80,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 80% 90%,rgba(180,100,20,.06) 0%,transparent 60%);}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;background:white;border-radius:50%;animation:tw var(--d) ease-in-out infinite alternate;opacity:0;}
@keyframes tw{from{opacity:0}to{opacity:var(--o)}}

.stars-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }

/* SCREENS */
.screen{position:relative;z-index:1;width:100%;max-width:480px;padding:60px 28px 80px;display:flex;flex-direction:column;align-items:center;min-height:100vh;justify-content:center;}
.screen.hidden{display:none;}
.main-screen{position:relative;z-index:1;width:100%;max-width:800px;padding:50px 24px 90px;display:flex;flex-direction:column;align-items:center; transition: opacity 0.5s ease;}
.main-screen.hidden{display:none;}

/* LAYOUT */
.oracle-left, .oracle-right { display: flex; flex-direction: column; align-items: center; width: 100%; }

@media(min-width: 1024px) {
  .main-screen { 
    max-width: 1300px; 
    flex-direction: row; 
    justify-content: space-between; 
    align-items: flex-start; 
    padding: 12vh 40px 10vh; 
    gap: 60px; 
    min-height: 100vh; 
  }
  .oracle-left { 
    width: 440px; 
    flex-shrink: 0; 
    position: sticky; 
    top: 10vh; 
    height: max-content;
  }
  .oracle-right { 
    flex: 1; 
    display: flex;
    flex-direction: column;
  }
  .ritual-theater { 
    min-height: 500px; 
    display: flex;
    flex-direction: column;
    justify-content: center; 
  }
}

/* SHUFFLE ANIMATION - Unclipped space */
#shuffleStage { 
  position: relative; width: 400px; height: 300px; margin: 40px auto; 
  display: none; opacity: 0; transition: opacity 0.4s ease; 
  perspective: 1200px; transform-style: preserve-3d;
}
.shuffle-card { 
  position: absolute; top: 21px; left: 126px; /* Centered in the 400x300 space */
  width: 148px; height: 258px;
  background: linear-gradient(160deg,#12101e,#0d0b16); 
  border: 1px solid rgba(200,164,90,0.4); border-radius: 8px; z-index: 10; 
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}
.shuffle-card svg { position: absolute; width: 88%; height: 88%; opacity: .1; }
.shuffle-card::before { content: ''; position: absolute; inset: 7px; border: 1px solid rgba(200,164,90,.09); border-radius: 5px; pointer-events: none; }

@keyframes shuffle-left { 
  0% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } 
  50% { transform: translate3d(-100px, -20px, 50px) rotate(-15deg); z-index: 12; } 
  100% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } 
}
@keyframes shuffle-right { 
  0% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } 
  50% { transform: translate3d(100px, 20px, -50px) rotate(15deg); z-index: 8; } 
  100% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } 
}
.shuffling-l { animation: shuffle-left 0.7s cubic-bezier(0.25, 0.8, 0.5, 1) infinite; }
.shuffling-r { animation: shuffle-right 0.7s cubic-bezier(0.25, 0.8, 0.5, 1) infinite; }

/* HORIZONTAL SPREAD */
.spread-row { 
  width: 100%; max-width: 800px; display: flex; flex-direction: row; 
  justify-content: center; align-items: flex-start; gap: 30px; margin-top: 20px; 
  transition: opacity 0.5s ease;
}
.spread-row.faded { opacity: 0; }

/* CARD & TEXT */
.card-unit { flex: 1; display: flex; flex-direction: column; align-items: center; max-width: 200px; }
.slot-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.4em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:12px;}

.card-wrap{perspective:1200px;}
.card {
  width: 148px; height: 258px; position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(.23,1,.32,1);
  cursor: pointer;
}

/* The Vertical X-Axis Flip
  Strict rotational rules govern the physical illusion.
*/
.card.flipped { transform: rotateX(180deg); }
.card.flipped.rev { transform: rotateX(180deg) rotateZ(180deg); }

.card-back, .card-front {
  position: absolute; inset: 0; border-radius: 8px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
}

.card-back {
  background: linear-gradient(160deg,#12101e,#0d0b16);
  border: 1px solid rgba(200,164,90,.22);
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  transform: rotateX(0deg); /* Explicitly zeroed to prevent engine confusion */
  z-index: 2; /* Bound above the front */
}
.card-back svg { position: absolute; width: 88%; height: 88%; opacity: .1; }
.card-back::before { content: ''; position: absolute; inset: 7px; border: 1px solid rgba(200,164,90,.09); border-radius: 5px; }

.tap-hint { position: absolute; bottom: 13px; font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: .35em; color: rgba(200,164,90,.38); text-transform: uppercase; animation: breathe 2.8s ease-in-out infinite; }
@keyframes breathe { 0%, 100% { opacity: .3; } 50% { opacity: 1; } }

.card-front {
  background: linear-gradient(170deg,#f0e4c8,#e4d4a8);
  border: 1px solid var(--gold-dim);
  display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  padding: 15px 11px 11px; color: #1a1208;
  transform: rotateX(-180deg); /* Entombed facing the void */
  z-index: 1;
}
.card-front::before { content: ''; position: absolute; inset: 5px; border: 1px solid rgba(100,80,30,.14); border-radius: 5px; pointer-events: none; }
.cnum { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: .2em; color: rgba(100,80,30,.48); align-self: flex-start; }
.cglyph { font-size: 58px; line-height: 1; filter: drop-shadow(0 4px 10px rgba(0,0,0,.14)); }
.cname { font-family: 'Onryou', 'Cinzel', serif; font-size: 11px; letter-spacing: .1em; text-align: center; color: #2a1e08; line-height: 1.5; }
.crev { font-family: 'Onryou', serif; font-size: 10px; color: var(--ember); font-style: italic; letter-spacing: .15em; }

/* INLINE READING */
.inline-reading { width: 100%; max-width: 200px; opacity: 0; transform: translateY(10px); transition: opacity .8s ease, transform .8s ease; pointer-events: none; margin-top: 20px; text-align: center; }
.inline-reading.show { opacity: 1; transform: translateY(0); pointer-events: all; }
.inline-card-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold); letter-spacing: .12em; margin-bottom: 4px; }
.inline-tradition { font-size: 9px; letter-spacing: .2em; color: rgba(120,60,180,.62); font-family: 'Cinzel', serif; text-transform: uppercase; margin-bottom: 12px; }
.three-lines { font-size: 13px; line-height: 1.9; color: var(--cream); font-style: italic; font-weight: 300; }
.three-lines p { margin: 0; padding: 2px 0; }

/* SYNTHESIS */
.synthesis-block{ width:100%;max-width:560px;opacity:0;transition:opacity 0.8s ease; pointer-events:none; min-height: 200px; }
.synthesis-block.show{opacity:1;pointer-events:all;}
.synthesis-text{font-family:'IPAexMincho', 'Cormorant Garamond', serif; font-size:16px;line-height:2.05;color:var(--cream);font-weight:300;font-style:italic;text-align:center;}

.synthesis-paragraph{margin-bottom:24px;opacity:0;transition:opacity 0.5s ease;}
.synthesis-paragraph.visible{opacity:1;}
.etch-cursor{color:var(--gold);animation:ecur .6s ease-in-out infinite alternate;}
@keyframes ecur{from{opacity:.4;}to{opacity:1;}}
.etch-ghost{color:var(--gold);opacity:.85;font-style:italic;}
.etch-word{color:var(--gold);}

/* ACTIONS */
.inline-actions { margin-top: 15px; }
.inline-action { color: var(--gold); cursor: pointer; text-decoration: underline; text-underline-offset: 4px; font-style: italic; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .1em; margin: 0 10px; }
.inline-action:hover { text-shadow: 0 0 10px rgba(200,164,90,.5); }

/* ELEMENTS */
.intake-title{font-family:'Cinzel',serif;font-size:clamp(24px,5vw,38px);color:var(--gold);text-align:center;margin-bottom:8px;}
.field-group{width:100%;margin-bottom:20px;}
.field-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.4em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:7px;display:block;}
input{width:100%;background:rgba(200,164,90,.04);border:1px solid var(--gold-dim);color:var(--parchment);font-family:'Cormorant Garamond',serif;font-size:15px;padding:12px 16px;border-radius:2px;}
.submit-btn{width:100%;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.35em;padding:14px;cursor:pointer;transition:all .4s;}
.submit-btn:hover{color:var(--void);background:var(--gold);}
.error-msg{font-family:'Onryou', serif; font-size:14px;color:var(--ember);font-style:italic;letter-spacing:.1em;margin-top:10px;text-align:center;min-height:16px;}

@media(max-width:1023px){
  .spread-row{flex-direction:column;align-items:center;}
  .card-unit{margin-bottom:30px;}
  .synthesis-block { margin-top: 40px; }
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<canvas id="constellationCanvas" class="stars-canvas"></canvas>

<div class="screen" id="intakeScreen">
  <div class="intake-title">Lunarot</div>
  <div class="field-group"><label class="field-label" for="dobInput">Date of Birth</label><input type="date" id="dobInput"/></div>
  <div class="field-group"><label class="field-label" for="timeInput">Time of Birth</label><input type="time" id="timeInput"/></div>
  <div class="field-group"><label class="field-label" for="nameInput">Your Name</label><input type="text" id="nameInput" maxlength="40"/></div>
  <button class="submit-btn" onclick="submitIntake()">✦ Begin the Draw ✦</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="main-screen hidden" id="mainScreen">
  <div class="oracle-left">
    <div class="eyebrow" id="chartEyebrow">☽ · ✦ · ♄</div>
    <h1>The Sacred Draw</h1>
    <div class="chart-label" id="chartLabel">Natal Chart</div>
    <div class="chart-desc" id="chartDesc"></div>
    <div class="synthesis-block" id="synthesisBlock">
      <div class="synthesis-text" id="synthesisText"></div>
    </div>
  </div>
  <div class="oracle-right">
    <div class="ritual-theater">
      <div id="shuffleStage">
        <div class="shuffle-card shuffling-l"></div>
        <div class="shuffle-card shuffling-r" style="animation-delay: 0.1s"></div>
        <div class="shuffle-card shuffling-l" style="animation-delay: 0.2s"></div>
      </div>
      <div class="spread-row" id="spreadRow"></div>
    </div>
  </div>
</div>

<script>
// ── STARS ──────────────────────────────────────────────────
(function(){
  const s=document.getElementById('stars');
  for(let i=0;i<100;i++){
    const el=document.createElement('div');el.className='star';
    const sz=Math.random()*1.6+0.4;
    el.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*5+2).toFixed(1)}s;--o:${(Math.random()*0.45+0.05).toFixed(2)};animation-delay:${(Math.random()*6).toFixed(1)}s;`;
    s.appendChild(el);
  }
})();

// ── ASTROLOGY ENGINE ───────────────────────────────────────
const SIGN_NAMES=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];

function getSunSign(month,day){
  const cuts=[[3,21],[4,20],[5,21],[6,21],[7,23],[8,23],[9,23],[10,23],[11,22],[12,22],[1,20],[2,19]];
  for(let i=0;i<12;i++){
    const [m,d]=cuts[i],[nm,nd]=cuts[(i+1)%12];
    if((month===m&&day>=d)||(month===nm&&day<nd))return i;
  }
  return 9;
}

function toJD(year,month,day,hour=12){
  const a=Math.floor((14-month)/12),y=year+4800-a,m=month+12*a-3;
  const JDN=day+Math.floor((153*m+2)/5)+365*y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)-32045;
  return JDN+(hour-12)/24;
}

function getMoonSign(jd){
  const REF_JD=2451549.5,REF_SIGN=9,LUNAR=29.530589,SIGN_DAYS=LUNAR/12;
  const offset=Math.floor((jd-REF_JD)/SIGN_DAYS)%12;
  return((REF_SIGN+offset)%12+12)%12;
}

function getRisingSign(jd,birthHour){
  const sunLon=(jd-2451545.0)*360/365.25;
  const sunSign=Math.floor(((sunLon%360)+360)%360/30);
  const signOffset=Math.round((birthHour-12)/2);
  return((sunSign+signOffset+3)%12+12)%12;
}

// ── LEXICON ────────────────────────────────────────────────
const SIGN_ADJ={
  Aries:       ['ignited','sovereign','first-born','ungoverned','headlong','scorched','nascent','raw-edged','unbroken','blazing','impulsive','initiating','fierce','untamed','rushing','crackling'],
  Taurus:      ['rooted','slow-turning','earthbound','unhurried','anchored','mineral','enduring','lush','immovable','patient','sensate','verdant','weighted','solid','persistent','laden'],
  Gemini:      ['doubled','mercurial','half-lit','mutable','edge-walking','flickering','bifurcated','restless','curious','windborne','plural','scattered','quicksilver','unresolved','circling','twice-told'],
  Cancer:      ['tidal','shell-wearing','lunar-pulled','interior','moonlit','retreating','ancestral','soft-shelled','protective','dreaming','submerged','tender','walled','remembering','saltwater','enclosed'],
  Leo:         ['gilded','sun-fixed','sovereign','heart-forward','performing','radiant','proud','generous','central','illuminated','magnanimous','warm-blooded','theatrical','glowing','named','seen'],
  Virgo:       ['precise','discerning','grain-sorted','quiet-handed','exact','ritual','attending','mending','cleansed','analytical','devoted','fault-finding','minimal','careful','ordered','gathered'],
  Libra:       ['suspended','weighing','wind-minded','both-sided','aesthetic','hovering','diplomatic','unresolved','harmonising','soft-spoken','mirrored','balanced','air-born','refining','considering','between'],
  Scorpio:     ['subterranean','molten','still-water','unblinking','venom-laced','regenerating','deep-cut','obsidian','penetrating','fixed','alchemical','silent','magnetic','unearthing','relentless','unseen'],
  Sagittarius: ['arrow-loosed','horizon-bound','fire-riding','expansive','half-wild','philosophical','wandering','truth-hungry','centauric','boundless','bright-aimed','roaming','questioning','free','overshot','becoming'],
  Capricorn:   ['stone-built','patient-climbing','winter-born','austere','load-bearing','long-shadowed','mineral','summit-seeking','structured','disciplined','enduring','measured','reserved','ancient','earned','slow-lit'],
  Aquarius:    ['electric','detached','future-haunted','cold-lit','visionary','estranged','signal-sending','air-fixed','alien','reforming','disconnected','crystalline','strange','remote','ahead','untouched'],
  Pisces:      ['dissolving','oceanic','border-thin','permeable','fog-born','dreaming','everything-and-nothing','uncontained','fluid','boundaryless','surrendered','empathic','mythic','liminal','wavering','unnamed'],
};

const CARD_ADJ={
  'The Fool':          ['threshold','unbegun','unburdened','about to fall','leaping'],
  'The Magician':      ['channelling','willed','instrumental','deliberate','conjuring'],
  'The High Priestess':['veiled','unspeaking','between','lunar','kept'],
  'The Empress':       ['abundant','embodied','fertile','earthen','overflowing'],
  'The Emperor':       ['structured','lawful','fathered','built','immovable'],
  'The Hierophant':    ['inherited','transmitted','orthodox','encoded','received'],
  'The Lovers':        ['choosing','split','mirrored','covenanted','doubled'],
  'The Chariot':       ['directed','harnessed','moving','controlled','driven'],
  'Strength':          ['tamed','soft-powerful','patient','animal','held'],
  'The Hermit':        ['solitary','lantern-holding','withdrawn','inward','alone'],
  'Wheel of Fortune':  ['turning','cyclic','fated','indifferent','returning'],
  'Justice':           ['consequenced','balanced','exacting','clear','answering'],
  'The Hanged Man':    ['suspended','inverted','waiting','surrendered','still'],
  'Death':             ['ending','composting','releasing','transforming','departing'],
  'Temperance':        ['alchemising','patient','blending','middle','measured'],
  'The Devil':         ['bound','shadowed','chained','seduced','refusing to leave'],
  'The Tower':         ['struck','collapsing','revealed','sudden','undone'],
  'The Star':          ['hoping','wounded-guiding','night-lit','open','visible'],
  'The Moon':          ['illusory','subterranean','howling','unclear','dreaming'],
  'The Sun':           ['clarified','returned','warm','visible','named'],
  'Judgement':         ['called','resurrected','answered','awakened','summoned'],
  'The World':         ['completed','dancing','encompassed','whole','arrived'],
  'Ace of Cups':       ['overflowing','given','opened','held out','beginning'],
  'Three of Swords':   ['pierced','grief-clear','through-cut','named at last','honest'],
  'Five of Cups':      ['mourning','spilled','backwards-facing','grieving','still counting'],
  'Ten of Pentacles':  ['legacy-built','accumulated','inherited','lasting','given forward'],
  'Page of Wands':     ['spark-stage','unlit','restless','almost-beginning','bright'],
  'Knight of Swords':  ['charging','truth-first','fast','unpausing','cutting through'],
  'Queen of Cups':     ['witnessed','empathic','throne-holding','feeling-named','present'],
  'King of Pentacles': ['patient-mastered','solid','earned','unhurried','grounded'],
  'Seven of Wands':    ['defended','summit-alone','holding ground','outnumbered','standing'],
  'Two of Cups':       ['mirrored','meeting','recognised','offered','mutual'],
};

const TEMPLATES_LINE=[
  'something {chart} and {card} —',
  'the {sign} in you, {card}',
  'a {chart} thing {card} in the dark',
  '{card}, as only the {sign} knows how',
  'what is {chart} becomes {card}',
  'the {sign} tongue — {chart}, {card}',
  '{chart} light through a {card} window',
  'born {chart}, arriving {card}',
  'the {sign} moves {chart} here — {card}',
  'neither {chart} nor {card}, both',
  'the {chart} part of you that is {card}',
  '{chart} like {sign}, {card} like water',
  'to be {chart} is to become {card}',
  'the {card} surface of a {chart} thing',
  '{chart} hands, {card} intentions',
  'something {sign} — {chart} until {card}',
  '{chart} where it started, {card} where it lands',
  'the {sign} way of being {card}',
  'not quite {chart}, not yet {card}',
  '{card} — which is what {chart} looks like from the outside',
];

const TEMPLATES_SYNTHESIS=[
  'The {sun} carries something {sunAdj}. The {moon} holds something {moonAdj}. What the cards have drawn toward the surface — {cardAdj1}, then {cardAdj2} — is not new, only finally visible.',
  'Something {sunAdj} in the bones. Something {moonAdj} in the blood. The spread names the space between: {cardAdj1} pressing against {cardAdj2}, the self as its own unfinished argument.',
  'The {sun} arrives {sunAdj}. The {moon} stays {moonAdj}. The three positions reveal what the chart already suspected — a {cardAdj1} life navigating a {cardAdj2} world, still translating.',
  'There is something {sunAdj} about the way it begins, and something {moonAdj} about the way it ends. The middle is what the cards name: {cardAdj1}, then {cardAdj2}, then the long silence after.',
  'The chart says {sunAdj}. The draw says {cardAdj1}. The {moon} moon keeps its answer — {moonAdj} — tucked beneath both. The truth lives in the overlap of all three.',
  '{sunAdj} at the surface. {moonAdj} underneath. The spread fills the gap with what neither placement will say directly — {cardAdj1} becoming {cardAdj2}, slow and without announcement.',
  'The {sun} in you is {sunAdj}. The {moon} is {moonAdj}. The cards have drawn a line between them — {cardAdj1} to {cardAdj2} — and called it the journey.',
  'What is {sunAdj} seeks what is {moonAdj}. The draw places {cardAdj1} at the beginning and {cardAdj2} at the horizon. The distance between them is not a problem. It is the path.',
];

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function makeLine(chartSign,cardName,isReversed){
  const chartAdj=pick(SIGN_ADJ[chartSign]||SIGN_ADJ['Pisces']);
  const cardAdjs=CARD_ADJ[cardName]||['present','still','unnamed'];
  let cardAdj=pick(cardAdjs);
  if(isReversed){
    const neg=['not quite','once','almost','barely','refusing to be','only briefly','no longer'];
    cardAdj=pick(neg)+' '+cardAdj;
  }
  return pick(TEMPLATES_LINE)
    .replace('{chart}',chartAdj)
    .replace('{card}',cardAdj)
    .replace('{sign}',chartSign);
}

function makeSynthesis(natal,drawn){
  const tmpl=pick(TEMPLATES_SYNTHESIS);
  const sunAdj=pick(SIGN_ADJ[natal.sun]||['stone-built']);
  const moonAdj=pick(SIGN_ADJ[natal.moon]||['oceanic']);
  const allAdjs=drawn.reduce(function(acc,c){return acc.concat(CARD_ADJ[c.name]||['present']);}, []);
  const ca1=pick(allAdjs);
  const rest=allAdjs.filter(a=>a!==ca1);
  const ca2=rest.length?pick(rest):pick(allAdjs);
  return tmpl
    .replace('{sun}',natal.sun)
    .replace('{sunAdj}',sunAdj)
    .replace('{moon}',natal.moon)
