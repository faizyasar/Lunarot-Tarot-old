<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunarot · Sacred Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --void:#05040a; --parchment:#ede0c8; --gold:#c8a45a; --gold-dim:#6e5a30;
  --ash:#100e18; --cream:#ddd0b8; --ember:#8c2a2a;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--void);color:var(--parchment);font-family:'Cormorant Garamond',serif;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;scroll-behavior:smooth;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 50% -10%,rgba(100,40,160,.18) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 20% 80%,rgba(40,10,80,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 80% 90%,rgba(180,100,20,.06) 0%,transparent 60%);}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;background:white;border-radius:50%;animation:tw var(--d) ease-in-out infinite alternate;opacity:0;}
@keyframes tw{from{opacity:0}to{opacity:var(--o)}}

.stars-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }

/* SCREENS */
.screen{position:relative;z-index:1;width:100%;max-width:480px;padding:60px 28px 80px;display:flex;flex-direction:column;align-items:center;min-height:100vh;justify-content:center;}
.screen.hidden{display:none;}
.main-screen{position:relative;z-index:1;width:100%;max-width:800px;padding:50px 24px 90px;display:flex;flex-direction:column;align-items:center;}
.main-screen.hidden{display:none;}

/* ── THE HORIZON (DESKTOP RECLAMATION) ── */
.oracle-left, .oracle-right { display: flex; flex-direction: column; align-items: center; width: 100%; }

.ritual-theater {
  position: relative;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 340px; /* Maintains vertical dignity */
}

@media(min-width: 1024px) {
  .main-screen { 
    max-width: 1300px; 
    flex-direction: row; 
    justify-content: space-between; 
    align-items: stretch; 
    padding: 12vh 40px 10vh; 
    gap: 60px; 
    min-height: 100vh; 
  }
  
  .oracle-left { 
    width: 440px; 
    flex-shrink: 0; 
    position: sticky; 
    top: 10vh; 
    height: max-content;
  }
  
  .oracle-right { 
    flex: 1; 
    display: flex;
    flex-direction: column;
  }
  
  .ritual-theater { 
    flex: 1; 
    display: flex;
    flex-direction: column;
    justify-content: center; 
    min-height: 500px;
  }
  
  .spread-row { gap: 20px; margin-top: 0; }
  .synthesis-block { margin-top: 30px; width: 100%; max-width: 100%; }
}

/* INTAKE */
.intake-title{font-family:'Cinzel',serif;font-size:clamp(24px,5vw,38px);color:var(--gold);letter-spacing:.2em;text-align:center;text-shadow:0 0 40px rgba(200,164,90,.2);margin-bottom:8px;}
.intake-sub{font-size:13px;font-style:italic;color:var(--gold-dim);letter-spacing:.08em;text-align:center;margin-bottom:44px;}
.geo{display:flex;align-items:center;gap:10px;width:100%;margin:14px 0 32px;max-width:460px;}
.geo-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim));}
.geo-line.r{background:linear-gradient(90deg,var(--gold-dim),transparent);}
.geo-sym{font-size:13px;color:var(--gold-dim);}
.field-group{width:100%;margin-bottom:20px;}
.field-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.4em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:7px;display:block;}
.field-hint{font-size:11px;font-style:italic;color:rgba(200,164,90,.4);margin-bottom:7px;display:block;letter-spacing:.04em;}
input[type="date"],input[type="time"],input[type="text"]{width:100%;background:rgba(200,164,90,.04);border:1px solid var(--gold-dim);color:var(--parchment);font-family:'Cormorant Garamond',serif;font-size:15px;padding:12px 16px;letter-spacing:.05em;outline:none;transition:border-color .3s;border-radius:2px;color-scheme:dark;}
input:focus{border-color:var(--gold);}
input::placeholder{color:rgba(200,164,90,.28);}
.submit-btn{width:100%;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.35em;padding:14px;cursor:pointer;text-transform:uppercase;transition:all .4s;margin-top:8px;position:relative;overflow:hidden;}
.submit-btn::before{content:'';position:absolute;inset:0;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.23,1,.32,1);z-index:-1;}
.submit-btn:hover{color:var(--void);}
.submit-btn:hover::before{transform:scaleX(1);}
.error-msg{font-size:11px;color:var(--ember);font-style:italic;letter-spacing:.1em;margin-top:10px;text-align:center;min-height:16px;}

/* MAIN */
.eyebrow{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:10px;text-align:center;}
h1{font-family:'Cinzel',serif;font-size:clamp(20px,5vw,30px);font-weight:400;color:var(--gold);letter-spacing:.2em;text-align:center;text-shadow:0 0 40px rgba(200,164,90,.2);margin-bottom:6px;line-height:1.4;}
.sub{font-size:13px;font-style:italic;color:var(--gold-dim);letter-spacing:.08em;margin-bottom:10px;text-align:center;}
.chart-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.3em;color:var(--gold-dim);text-transform:uppercase;text-align:center;margin-bottom:8px;}
.chart-desc{font-size:12px;font-style:italic;color:var(--gold-dim);letter-spacing:.07em;text-align:center;margin-bottom:26px;max-width:400px;line-height:1.85; transition: min-height 0.3s;}

/* SHUFFLE ANIMATION - Absolute Centering without Transforms */
#shuffleStage { 
  position: absolute; 
  top: 50%; left: 50%; 
  margin-top: -129px; margin-left: -74px; /* Centers the 148x258 box perfectly */
  width: 148px; height: 258px; 
  visibility: hidden; opacity: 0; 
  transition: opacity 0.8s ease; 
  perspective: 1200px; transform-style: preserve-3d;
  z-index: 50; 
}
.shuffle-card { 
  position: absolute; inset: 0; background: linear-gradient(160deg,#12101e,#0d0b16); 
  border: 1px solid rgba(200,164,90,0.4); border-radius: 8px; 
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}
.shuffle-card svg { position: absolute; width: 88%; height: 88%; opacity: .1; }
.shuffle-card::before { content: ''; position: absolute; inset: 7px; border: 1px solid rgba(200,164,90,.09); border-radius: 5px; pointer-events: none; }

@keyframes shuffle-left { 
  0% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } 
  50% { transform: translate3d(-95px, -15px, 20px) rotate(-12deg); z-index: 12; } 
  100% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } 
}
@keyframes shuffle-right { 
  0% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } 
  50% { transform: translate3d(95px, 15px, -20px) rotate(12deg); z-index: 8; } 
  100% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } 
}
.shuffling-l { animation: shuffle-left 0.7s cubic-bezier(0.25, 0.8, 0.5, 1) infinite; }
.shuffling-r { animation: shuffle-right 0.7s cubic-bezier(0.25, 0.8, 0.5, 1) infinite; }

/* HORIZONTAL SPREAD */
.spread-row { 
  width: 100%; max-width: 800px; display: flex; flex-direction: row; 
  justify-content: center; align-items: flex-start; gap: 30px; margin-top: 20px; 
  opacity: 1; transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1);
}
.spread-row.faded { opacity: 0; pointer-events: none; }
.card-unit { flex: 1; display: flex; flex-direction: column; align-items: center; max-width: 200px; }
.slot-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.4em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:12px;}

/* CARD */
.card-wrap{perspective:1200px;transition:transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);}
.card{width:148px;height:258px;position:relative;transform-style:preserve-3d;transition:transform 1s cubic-bezier(.23,1,.32,1);cursor:pointer;}
.card.flipped{transform:rotateY(180deg);}
.card.flipped.rev{transform:rotateY(180deg) rotateZ(180deg);}
.card-back,.card-front{position:absolute;inset:0;border-radius:8px;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.card-back{background:linear-gradient(160deg,#12101e,#0d0b16);border:1px solid rgba(200,164,90,.22);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.card-back svg{position:absolute;width:88%;height:88%;opacity:.1;}
.card-back::before{content:'';position:absolute;inset:7px;border:1px solid rgba(200,164,90,.09);border-radius:5px;}
.tap-hint{position:absolute;bottom:13px;font-family:'Cinzel',serif;font-size:8px;letter-spacing:.35em;color:rgba(200,164,90,.38);text-transform:uppercase;animation:breathe 2.8s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:1}}
.card-front{background:linear-gradient(170deg,#f0e4c8,#e4d4a8);border:1px solid var(--gold-dim);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:15px 11px 11px;color:#1a1208;}
.card-front::before{content:'';position:absolute;inset:5px;border:1px solid rgba(100,80,30,.14);border-radius:5px;pointer-events:none;}
.cnum{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.2em;color:rgba(100,80,30,.48);align-self:flex-start;}
.cglyph{font-size:58px;line-height:1;filter:drop-shadow(0 4px 10px rgba(0,0,0,.14));}
.cname{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.1em;text-align:center;color:#2a1e08;line-height:1.5;}
.crev{font-size:8px;color:var(--ember);font-style:italic;letter-spacing:.15em;}

/* INLINE READING */
.inline-reading{width:100%;max-width:200px;opacity:0;transform:translateY(10px);transition:opacity .8s ease,transform .8s ease;pointer-events:none;margin-top:20px;text-align:center;}
.inline-reading.show{opacity:1;transform:translateY(0);pointer-events:all;}
.inline-card-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:.12em;margin-bottom:4px;}
.inline-tradition{font-size:9px;letter-spacing:.2em;color:rgba(120,60,180,.62);font-family:'Cinzel',serif;text-transform:uppercase;margin-bottom:12px;}
.three-lines{font-size:13px;line-height:1.9;color:var(--cream);font-style:italic;font-weight:300;}
.three-lines p{margin:0;padding:2px 0;}

/* SYNTHESIS */
.synthesis-block{
  width:100%;max-width:560px;opacity:0;transform:translateY(16px);
  transition:opacity 1s cubic-bezier(0.23, 1, 0.32, 1), transform 1s cubic-bezier(0.23, 1, 0.32, 1);
  pointer-events:none;
}
.synthesis-block.show{opacity:1;transform:translateY(0);pointer-events:all;}
.synthesis-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.45em;color:var(--gold-dim);text-transform:uppercase;text-align:center;margin-bottom:18px;}
.synthesis-text{font-size:15px;line-height:2.05;color:var(--cream);font-weight:300;font-style:italic;text-align:center; transition: min-height 0.3s;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.loaded{animation:fadeUp .7s ease forwards;}

/* ── SYNTHESIS flame etch ── */
.synthesis-paragraph{margin-bottom:24px;opacity:0;transform:translateY(28px);transition:opacity 1s cubic-bezier(.23,1,.32,1),transform 1s cubic-bezier(.23,1,.32,1);}
.synthesis-paragraph.visible{opacity:1;transform:translateY(0);}
.etch-cursor{color:var(--gold);animation:ecur .6s ease-in-out infinite alternate;}
@keyframes ecur{from{opacity:.4;text-shadow:none}to{opacity:1;text-shadow:0 0 8px var(--gold),0 0 20px rgba(200,164,90,.4)}}
.etch-ghost{color:var(--gold);text-shadow:0 0 12px rgba(200,164,90,.7);opacity:.85;font-style:italic;}
.etch-word{color:var(--gold);text-shadow:0 0 10px rgba(200,164,90,.5);animation:esettle 1.8s ease forwards;}
@keyframes esettle{0%{color:var(--gold);text-shadow:0 0 18px rgba(200,164,90,.9)}70%{color:#e8cca0;text-shadow:0 0 4px rgba(200,164,90,.2)}100%{color:var(--cream);text-shadow:none}}

/* INLINE ACTIONS */
@keyframes fadeReveal {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.inline-actions { opacity: 0; animation: fadeReveal 1.2s ease 0.6s forwards; display: inline-block; white-space: nowrap; margin-left: 10px; }
.inline-action { color: rgba(200,164,90,.6); cursor: pointer; text-decoration: underline; text-underline-offset: 4px; font-style: italic; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .1em; transition: color .3s, text-shadow .3s; }
.inline-action:hover { color: var(--gold); text-shadow: 0 0 10px rgba(200,164,90,.5); }

/* mobile adjustments */
@media(max-width:1023px){
  .spread-row{flex-direction:column;align-items:center;}
  .card-unit{margin-bottom:30px;}
  .synthesis-block { margin-top: 40px; }
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<canvas id="constellationCanvas" class="stars-canvas"></canvas>

<div class="screen" id="intakeScreen">
  <div class="intake-title">Lunarot</div>
  <div class="intake-sub">enter the coordinates of your arrival</div>
  <div class="geo"><div class="geo-line"></div><div class="geo-sym">✦</div><div class="geo-line r"></div></div>

  <div class="field-group">
    <label class="field-label" for="dobInput">Date of Birth</label>
    <input type="date" id="dobInput"/>
  </div>

  <div class="field-group">
    <label class="field-label" for="timeInput">Time of Birth &nbsp;<span style="color:rgba(200,164,90,.38);font-style:italic;font-size:10px;letter-spacing:.06em;">(optional · for Rising sign)</span></label>
    <span class="field-hint">leave blank if unknown · local birth time</span>
    <input type="time" id="timeInput"/>
  </div>

  <div class="field-group">
    <label class="field-label" for="nameInput">Your Name &nbsp;<span style="color:rgba(200,164,90,.38);font-style:italic;font-size:10px;letter-spacing:.06em;">(optional)</span></label>
    <input type="text" id="nameInput" placeholder="or leave it to the void" maxlength="40"/>
  </div>

  <button class="submit-btn" onclick="submitIntake()">✦ Begin the Draw ✦</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="main-screen hidden" id="mainScreen">
  <div class="oracle-left">
    <div class="eyebrow" id="chartEyebrow">☽ · ✦ · ♄</div>
    <h1>The Sacred Draw</h1>
    <div class="sub">past · present · future</div>

    <div class="geo" style="width:100%;margin:14px 0 26px;">
      <div class="geo-line"></div><div class="geo-sym">✡ · ☽ · 𓂀 · ✦ · 卍</div><div class="geo-line r"></div>
    </div>

    <div class="chart-label" id="chartLabel">Natal Chart</div>
    <div class="chart-desc" id="chartDesc"></div>

    <div class="synthesis-block" id="synthesisBlock">
      <div class="synthesis-label">✦ The Confluence ✦</div>
      <div class="synthesis-text" id="synthesisText"></div>
    </div>
  </div>

  <div class="oracle-right">
    <div class="ritual-theater">
      <div id="shuffleStage">
        <div class="shuffle-card shuffling-l"></div>
        <div class="shuffle-card shuffling-r" style="animation-delay: 0.1s"></div>
        <div class="shuffle-card shuffling-l" style="animation-delay: 0.2s"></div>
      </div>
      <div class="spread-row" id="spreadRow"></div>
    </div>
  </div>
</div>

<script>
// ── STARS ──────────────────────────────────────────────────
(function(){
  const s=document.getElementById('stars');
  for(let i=0;i<100;i++){
    const el=document.createElement('div');el.className='star';
    const sz=Math.random()*1.6+0.4;
    el.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*5+2).toFixed(1)}s;--o:${(Math.random()*0.45+0.05).toFixed(2)};animation-delay:${(Math.random()*6).toFixed(1)}s;`;
    s.appendChild(el);
  }
})();

// ── ASTROLOGY ENGINE ───────────────────────────────────────
const SIGN_NAMES=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];

function getSunSign(month,day){
  const cuts=[[3,21],[4,20],[5,21],[6,21],[7,23],[8,23],[9,23],[10,23],[11,22],[12,22],[1,20],[2,19]];
  for(let i=0;i<12;i++){
    const [m,d]=cuts[i],[nm,nd]=cuts[(i+1)%12];
    if((month===m&&day>=d)||(month===nm&&day<nd))return i;
  }
  return 9;
}

function toJD(year,month,day,hour=12){
  const a=Math.floor((14-month)/12),y=year+4800-a,m=month+12*a-3;
  const JDN=day+Math.floor((153*m+2)/5)+365*y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)-32045;
  return JDN+(hour-12)/24;
}

function getMoonSign(jd){
  const REF_JD=2451549.5,REF_SIGN=9,LUNAR=29.530589,SIGN_DAYS=LUNAR/12;
  const offset=Math.floor((jd-REF_JD)/SIGN_DAYS)%12;
  return((REF_SIGN+offset)%12+12)%12;
}

function getRisingSign(jd,birthHour){
  const sunLon=(jd-2451545.0)*360/365.25;
  const sunSign=Math.floor(((sunLon%360)+360)%360/30);
  const signOffset=Math.round((birthHour-12)/2);
  return((sunSign+signOffset+3)%12+12)%12;
}

// ── LEXICON ────────────────────────────────────────────────

  Capricorn:   ['stone-built','patient-climbing','winter-born','austere','load-bearing','long-shadowed','mineral','summit-seeking','structured','disciplined','enduring','measured','reserved','ancient','earned','slow-lit'],

};

const CARD_ADJ={
  'The Fool':          ['threshold','unbegun','unburdened','about to fall','leaping'],

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function makeLine(chartSign,cardName,isReversed){
  const chartAdj=pick(SIGN_ADJ[chartSign]||SIGN_ADJ['Pisces']);
  const cardAdjs=CARD_ADJ[cardName]||['present','still','unnamed'];
  let cardAdj=pick(cardAdjs);
  if(isReversed){
    const neg=['not quite','once','almost','barely','refusing to be','only briefly','no longer'];
    cardAdj=pick(neg)+' '+cardAdj;
  }
  return pick(TEMPLATES_LINE)
    .replace('{chart}',chartAdj)
    .replace('{card}',cardAdj)
    .replace('{sign}',chartSign);
}

function makeSynthesis(natal,drawn){
  const tmpl=pick(TEMPLATES_SYNTHESIS);
  const sunAdj=pick(SIGN_ADJ[natal.sun]||['stone-built']);
  const moonAdj=pick(SIGN_ADJ[natal.moon]||['oceanic']);
  const allAdjs=drawn.reduce(function(acc,c){return acc.concat(CARD_ADJ[c.name]||['present']);}, []);
  const ca1=pick(allAdjs);
  const rest=allAdjs.filter(a=>a!==ca1);
  const ca2=rest.length?pick(rest):pick(allAdjs);
  return tmpl
    .replace('{sun}',natal.sun)
    .replace('{sunAdj}',sunAdj)
    .replace('{moon}',natal.moon)
    .replace('{moonAdj}',moonAdj)
    .replace('{cardAdj1}',ca1)
    .replace('{cardAdj2}',ca2);
}

const cCanvas = document.getElementById('constellationCanvas');
const cCtx = cCanvas.getContext('2d');
let cw, ch;
let activePlanets=new Set(), animFrame=0;
let t0=0;

function resizeCanvas() {
  cw = window.innerWidth;
  ch = window.innerHeight;
  cCanvas.width = cw;
  cCanvas.height = ch;
}
window.addEventListener('resize', resizeCanvas);

function drawConstellation() {
  cCtx.clearRect(0, 0, cw, ch);
  t0 += 0.0015;

  const cx = cw / 2;
  const cy = ch / 2;
  
  const rx = cw * 0.45; 
  const ry = ch * 0.45;

  const activeNodes = [];

  NATAL_PLANETS.forEach(p => {
    const isActive = activePlanets.has(p.name);
    const driftDeg = p.deg + (t0 * 15); 
    const rad = (driftDeg - 90) * Math.PI / 180;
    
    const px = cx + rx * Math.cos(rad);
    const py = cy + ry * Math.sin(rad);

    if (isActive) activeNodes.push({ x: px, y: py, color: p.color });

    const alpha = isActive ? 0.9 : 0.15;
    const size = isActive ? 3 : 1.5;
    
    cCtx.beginPath();
    cCtx.arc(px, py, size, 0, Math.PI * 2);
    cCtx.fillStyle = `rgba(${hexToRgb(p.color)}, ${alpha})`;
    cCtx.fill();

    if (isActive) {
      cCtx.font = '12px "Cormorant Garamond", serif';
      cCtx.fillStyle = `rgba(${hexToRgb(p.color)}, 0.8)`;
      cCtx.textAlign = 'center';
      cCtx.fillText(p.symbol, px, py - 12);
    }
  });

  if (activeNodes.length > 1) {
    cCtx.beginPath();
    cCtx.moveTo(activeNodes[0].x, activeNodes[0].y);
    for (let i = 1; i < activeNodes.length; i++) {
      cCtx.lineTo(activeNodes[i].x, activeNodes[i].y);
    }
    if (activeNodes.length > 2) {
      cCtx.lineTo(activeNodes[0].x, activeNodes[0].y);
    }
    
    const pulse = 0.15 + 0.15 * Math.sin(Date.now() / 800);
    cCtx.strokeStyle = `rgba(200, 164, 90, ${pulse})`;
    cCtx.lineWidth = 1;
    cCtx.setLineDash([4, 8]);
    cCtx.stroke();
    cCtx.setLineDash([]);
  }

  animFrame = requestAnimationFrame(drawConstellation);
}

async function startRitual() {
  const stage = document.getElementById('shuffleStage');
  const spread = document.getElementById('spreadRow');
  const syn = document.getElementById('synthesisBlock');
  
  let hasOldContent = spread.innerHTML.trim() !== '';

  if (hasOldContent) {
    // Escort the observer upward before wiping the stage, preventing violent descent
    if (window.innerWidth < 1024) {
       document.getElementById('mainScreen').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
       window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    await msDelay(600);
    
    // Command the past to fade elegantly
    spread.classList.add('faded');
    syn.classList.remove('show');
    await msDelay(800);
  }

  // The slate is wiped only once it is cloaked in darkness
  spread.innerHTML = '';
  document.getElementById('synthesisText').innerHTML = '';
  
  document.querySelectorAll('.shuffle-card').forEach(el => el.innerHTML = SVG_BACK);
  
  // The shuffle appears instantly via visibility, without triggering a layout reflow
  stage.style.visibility = 'visible';
  stage.style.opacity = '1';
  
  await msDelay(2200);
  
  stage.style.opacity = '0';
  await msDelay(800);
  
  stage.style.visibility = 'hidden';
  spread.classList.remove('faded');
  
  buildSpread();
}

var ALL_ADJ_SET = null;
function getAllAdjs(){
  if(ALL_ADJ_SET) return ALL_ADJ_SET;
  ALL_ADJ_SET = {};
  Object.values(SIGN_ADJ).forEach(function(arr){ arr.forEach(function(w){ ALL_ADJ_SET[w]=1; }); });
  Object.values(CARD_ADJ).forEach(function(arr){ arr.forEach(function(w){ ALL_ADJ_SET[w]=1; }); });
  return ALL_ADJ_SET;
}
function isCharged(word){
  var clean=word.toLowerCase().replace(/[^a-z-]/g,'');
  var adjs=getAllAdjs();
  if(adjs[clean]) return true;
  if(clean.indexOf('-')>-1 && clean.length>5) return true;
  return false;
}

var ARABIC="ابتثجحخدذرزسشصضطظعغفقكلمنهوي";
function randArabic(){ return ARABIC[Math.floor(Math.random()*ARABIC.length)]; }
function msDelay(ms){ return new Promise(function(r){setTimeout(r,ms);}); }

async function etchParagraph(el, text){
  el.classList.add('visible');
  el.innerHTML='';
  var words=text.split(' ');
  var rendered='';
  for(var w=0;w<words.length;w++){
    var word=words[w];
    var clean=word.toLowerCase().replace(/[^a-z-]/g,'');
    var charged=isCharged(clean);
    if(charged){
      el.innerHTML=rendered+'<span class="etch-cursor">▌</span>';
      await msDelay(160+Math.floor(Math.random()*120));
      var flickCount=6+Math.floor(Math.random()*6);
      for(var f=0;f<flickCount;f++){
        var ghost=word.split('').map(function(c){return c.match(/[a-zA-Z]/)?randArabic():c;}).join('');
        el.innerHTML=rendered+'<span class="etch-ghost">'+ghost+'</span><span class="etch-cursor">▌</span>';
        await msDelay(32+Math.floor(Math.random()*28));
      }
      el.innerHTML=rendered+'<span class="etch-ghost">'+word+'</span><span class="etch-cursor">▌</span>';
      await msDelay(80+Math.floor(Math.random()*60));
      rendered+='<span class="etch-word">'+word+'</span> ';
      el.innerHTML=rendered+'<span class="etch-cursor">▌</span>';
      await msDelay(50+Math.floor(Math.random()*40));
    } else {
      rendered+=word+' ';
      el.innerHTML=rendered+'<span class="etch-cursor">▌</span>';
      if(word.match(/[,;:—]/)){
        await msDelay(100+Math.floor(Math.random()*80));
      } else if(word.match(/[.!?]$/)){
        el.innerHTML=rendered;
        await msDelay(480+Math.floor(Math.random()*200));
        el.innerHTML=rendered+'<span class="etch-cursor">▌</span>';
        await msDelay(60);
      } else {
        await msDelay(16+Math.floor(Math.random()*12));
      }
    }
  }
  el.innerHTML=rendered.trim();
}

async function renderSynthesis(){
  var syn=document.getElementById('synthesisBlock');
  syn.classList.add('show');

  var container=document.getElementById('synthesisText');
  container.innerHTML='';
  container.style.minHeight = '0px';

  var paragraphs=makeSynthesisParagraphs(NATAL_USER,drawnCards);
  
  var paraEls=paragraphs.map(function(text){
    var p=document.createElement('div');
    p.className='synthesis-paragraph visible'; // Set visible temporarily to measure
    p.innerHTML=text;
    container.appendChild(p);
    return p;
  });

  // Calculate the structure of the choices before rendering to ensure stability
  const actionsHTML = ` <span class="inline-action" onclick="startRitual()">✦ draw again?</span> <span style="color:var(--gold-dim); margin:0 6px;">·</span> <span class="inline-action" onclick="resetToIntake()">change the date</span>`;
  const tempActions = document.createElement('span');
  tempActions.className = 'inline-actions';
  tempActions.style.opacity = '1';
  tempActions.innerHTML = actionsHTML;
  paraEls[paraEls.length - 1].appendChild(tempActions);

  // Measure the entirety of the fate, and lock the container's height to prevent shuddering
  const finalHeight = container.offsetHeight;
  container.style.minHeight = finalHeight + 'px';

  // Return to darkness and begin the slow etching
  paraEls.forEach(function(p, i){
    p.classList.remove('visible');
    p.setAttribute('data-text', paragraphs[i]);
    p.innerHTML = '';
  });

  await msDelay(800); 
  for (let i = 0; i < paraEls.length; i++) {
    await etchParagraph(paraEls[i], paraEls[i].getAttribute('data-text'));
    await msDelay(800); 
  }
  
  // Re-append the choices to emerge from the shadows
  const activeActions = document.createElement('span');
  activeActions.className = 'inline-actions';
  activeActions.innerHTML = actionsHTML;
  paraEls[paraEls.length - 1].appendChild(activeActions);
}

function makeSynthesisParagraphs(natal, drawn){
  var single = makeSynthesis(natal, drawn);
  var a1=pick(CARD_ADJ[drawn[0].name]||['present']);
  var a2=pick(CARD_ADJ[drawn[1].name]||['still']);
  var a3=pick(CARD_ADJ[drawn[2].name]||['unnamed']);
  var sunAdj=pick(SIGN_ADJ[natal.sun]||['stone-built']);
  var moonAdj=pick(SIGN_ADJ[natal.moon]||['oceanic']);
  var p2='The arc from '+drawn[0].name+' to '+drawn[2].name+' passes through '+drawn[1].name+'. '+a1+' becoming '+a2+', then '+a3+'. A '+sunAdj+' instinct meeting a '+moonAdj+' horizon. The chart already knew. The cards only confirmed it.';
  return [single, p2];
}
