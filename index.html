<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lunarot · Sacred Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── THE CURSED FONTS ── */
@font-face {
  font-family: 'IPAexMincho';
  src: url('fonts/ipaexm.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}
@font-face {
  font-family: 'Onryou';
  src: url('fonts/onryou.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}

:root {
  --void: #05040a; --parchment: #ede0c8; --gold: #c8a45a; --gold-dim: #6e5a30;
  --ash: #100e18; --cream: #ddd0b8; --ember: #8c2a2a;
  --c-scale: 1; 
}

/* ── NO SCROLL LOCK ── */
html, body {
  width: 100vw; height: 100vh; margin: 0; padding: 0;
  overflow: hidden !important; touch-action: none;
  background: var(--void); color: var(--parchment);
  font-family: 'Cormorant Garamond', serif;
  display: flex; flex-direction: column; align-items: center;
}

body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 60% 40% at 50% -10%, rgba(100,40,160,.18) 0%, transparent 70%),
              radial-gradient(ellipse 40% 60% at 20% 80%, rgba(40,10,80,.12) 0%, transparent 60%),
              radial-gradient(ellipse 50% 30% at 80% 90%, rgba(180,100,20,.06) 0%, transparent 60%);
}

.stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.star { position: absolute; background: white; border-radius: 50%; animation: tw var(--d) ease-in-out infinite alternate; opacity: 0; }
@keyframes tw { from { opacity: 0; } to { opacity: var(--o); } }
.stars-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }

/* ── THE THRESHOLD (INTRO SCREEN) ── */
.intro-screen {
  position: fixed; inset: 0; z-index: 100;
  background-color: var(--void);
  display: flex; justify-content: center; align-items: center;
  transition: opacity 1.5s ease;
  cursor: pointer;
}

.theater-backdrop {
  position: absolute; inset: 0;
  background-image: 
    radial-gradient(1.5px 1.5px at 15% 25%, rgba(255,255,255,0.9) 100%, transparent),
    radial-gradient(2px 2px at 35% 45%, rgba(255,255,255,0.5) 100%, transparent),
    radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.7) 100%, transparent),
    radial-gradient(2.5px 2.5px at 75% 85%, rgba(255,255,255,0.4) 100%, transparent),
    radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.8) 100%, transparent),
    radial-gradient(1.5px 1.5px at 25% 80%, rgba(255,255,255,0.6) 100%, transparent),
    radial-gradient(2px 2px at 90% 70%, rgba(255,255,255,0.7) 100%, transparent),
    radial-gradient(1px 1px at 10% 65%, rgba(255,255,255,0.5) 100%, transparent),
    radial-gradient(circle at 50% 50%, rgba(20,20,20,1) 0%, var(--void) 100%);
  opacity: 0; animation: fade-in 4s ease 0.5s forwards; z-index: 1;
}

.chimera-vessel { position: absolute; height: 90vh; width: 100%; display: flex; justify-content: center; z-index: 3; opacity: 0; filter: contrast(1.2) drop-shadow(0 0 30px rgba(0,0,0,0.8)); animation: fade-in 4s ease 1s forwards; pointer-events: none; }
.deka-insignia { position: absolute; top: 15%; z-index: 5; opacity: 0; transform: scale(1.1); animation: strike 0.8s cubic-bezier(0.1, 0.9, 0.2, 1) 1.5s forwards; }
.deka-insignia img { height: auto; width: clamp(200px, 30vw, 400px); border-radius: 50%; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }

.o-deka {
  position: absolute; top: calc(15% + clamp(100px, 15vw, 200px) + 30px);
  text-align: center; z-index: 5; display: flex; align-items: baseline; justify-content: center; gap: 0.6rem;
  font-family: 'Onryou', serif; color: var(--gold);
  animation: soul-flicker 5s infinite 3s;
}

.o-deka span {
  display: inline-block; font-size: 1.4rem; letter-spacing: 0.2em; text-transform: uppercase;
  opacity: 0; animation: blur-in-max 1.25s ease forwards;
  text-shadow: 0 0 10px rgba(200,164,90,0.5);
}
.o-deka span:nth-child(1) { animation-delay: 0.75s; }
.o-deka span:nth-child(2) { animation-delay: 1.50s; font-size: 1rem; }
.o-deka span:nth-child(3) { animation-delay: 2.25s; }

.latin-stack {
  position: absolute; right: 15%; top: 45%; text-align: right;
  font-family: 'Onryou', serif; color: var(--gold);
  font-size: clamp(0.9rem, 1.5vw, 1.3rem); line-height: 1.6; letter-spacing: 0.1em; text-transform: uppercase;
  z-index: 4; opacity: 0;
  animation: blur-in-min-flicker 6.25s ease 3.125s forwards;
}
.latin-stack span { display: block; }

@keyframes fade-in { to { opacity: 1; } }
@keyframes strike { 0% { opacity: 0; transform: scale(1.5) translateY(-20px); filter: blur(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } }
@keyframes blur-in-max { 0% { opacity: 0; filter: blur(20px); } 100% { opacity: 1; filter: blur(0); } }

/* Combines the 1.25s blur entrance with a perpetual jitter */
@keyframes blur-in-min-flicker {
  0% { opacity: 0; filter: blur(4px); }
  20% { opacity: 1; filter: blur(0); } /* Reaches full opacity after 1.25s */
  95% { opacity: 1; filter: blur(0); text-shadow: 0 0 5px rgba(200,164,90,0.3); }
  96% { opacity: 0.4; text-shadow: 0 0 15px var(--ember); }
  98% { opacity: 0.9; text-shadow: 0 0 8px var(--gold); }
  100% { opacity: 1; filter: blur(0); }
}

@keyframes soul-flicker {
  0%, 100% { opacity: 1; }
  92% { opacity: 1; }
  94% { opacity: 0.5; text-shadow: 2px 0 0 var(--ember); transform: translate(1px, -1px); }
  96% { opacity: 0.9; transform: translate(-1px, 1px); }
  98% { opacity: 0.3; }
}

/* ── MAIN SCREENS ── */
.screen { position: relative; z-index: 1; width: 100%; max-width: 480px; height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.screen.hidden { display: none; }
.main-screen { position: relative; z-index: 1; width: 100%; max-width: 1200px; height: 100vh; padding: 2vh 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.main-screen.hidden { display: none; }

.oracle-left, .oracle-right { display: flex; flex-direction: column; align-items: center; width: 100%; }

@media(min-width: 1024px) {
  .main-screen { flex-direction: row; justify-content: center; gap: 60px; }
  .oracle-left { width: 380px; flex-shrink: 0; }
  .oracle-right { flex: 1; max-width: 650px; }
}

/* ── INTAKE ── */
.intake-title { font-family: 'Cinzel', serif; font-size: clamp(24px, 5vw, 38px); color: var(--gold); letter-spacing: .2em; text-align: center; text-shadow: 0 0 40px rgba(200,164,90,.2); margin-bottom: 8px; }
.intake-sub { font-size: 13px; font-style: italic; color: var(--gold-dim); letter-spacing: .08em; text-align: center; margin-bottom: 24px; }
.geo { display: flex; align-items: center; gap: 10px; width: 100%; margin: 10px 0 20px; max-width: 460px; }
.geo-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim)); }
.geo-line.r { background: linear-gradient(90deg, var(--gold-dim), transparent); }
.geo-sym { font-size: 13px; color: var(--gold-dim); }
.field-group { width: 100%; margin-bottom: 15px; }
.field-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: .4em; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 5px; display: block; }
.field-hint { font-size: 10px; font-style: italic; color: rgba(200,164,90,.4); margin-bottom: 5px; display: block; letter-spacing: .04em; }
input[type="date"], input[type="time"], input[type="text"] { width: 100%; background: rgba(200,164,90,.04); border: 1px solid var(--gold-dim); color: var(--parchment); font-family: 'Cormorant Garamond', serif; font-size: 15px; padding: 12px 16px; letter-spacing: .05em; outline: none; border-radius: 2px; color-scheme: dark; }
input:focus { border-color: var(--gold); }
.submit-btn { width: 100%; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .35em; padding: 14px; cursor: pointer; text-transform: uppercase; transition: all .4s; margin-top: 5px; position: relative; overflow: hidden; }
.submit-btn::before { content: ''; position: absolute; inset: 0; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform .4s cubic-bezier(.23,1,.32,1); z-index: -1; }
.submit-btn:hover { color: var(--void); }
.submit-btn:hover::before { transform: scaleX(1); }
.error-msg { font-family: 'Onryou', serif; font-size: 14px; color: var(--ember); font-style: italic; letter-spacing: .1em; margin-top: 10px; text-align: center; min-height: 16px; }

/* ── TEXT RHYTHM ── */
.eyebrow { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: .5em; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 5px; text-align: center; }
h1 { font-family: 'Cinzel', serif; font-size: clamp(18px, 4vw, 28px); font-weight: 400; color: var(--gold); letter-spacing: .2em; text-align: center; text-shadow: 0 0 40px rgba(200,164,90,.2); margin-bottom: 2px; }
.sub { font-size: 12px; font-style: italic; color: var(--gold-dim); letter-spacing: .08em; margin-bottom: 5px; text-align: center; }
.chart-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: .3em; color: var(--gold-dim); text-transform: uppercase; text-align: center; margin-bottom: 6px; }
.chart-desc { font-size: 12px; font-style: italic; color: var(--gold-dim); letter-spacing: .07em; text-align: center; margin-bottom: 15px; max-width: 400px; line-height: 1.6; }

/* ── HORIZONTAL SPREAD ── */
.spread-row { width: 100%; display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 20px; opacity: 1; transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1); }
.spread-row.faded { opacity: 0; pointer-events: none; }
.card-unit { display: flex; flex-direction: column; align-items: center; width: auto; }
.slot-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: .4em; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 10px; }

/* ── SHUFFLE ── */
#shuffleStage { position: absolute; top: 50%; left: 50%; margin-top: calc(-129px * var(--c-scale)); margin-left: calc(-74px * var(--c-scale)); width: calc(148px * var(--c-scale)); height: calc(258px * var(--c-scale)); visibility: hidden; opacity: 0; transition: opacity 0.8s ease; perspective: 1200px; transform-style: preserve-3d; z-index: 50; }
.shuffle-card { position: absolute; inset: 0; background: linear-gradient(160deg,#12101e,#0d0b16); border: 1px solid rgba(200,164,90,0.4); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
.shuffle-card svg { position: absolute; width: 88%; height: 88%; opacity: .1; }
.shuffle-card::before { content: ''; position: absolute; inset: 7px; border: 1px solid rgba(200,164,90,.09); border-radius: 5px; }

@keyframes shuffle-left { 0% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } 50% { transform: translate3d(-60px, -10px, 20px) rotate(-12deg); z-index: 12; } 100% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } }
@keyframes shuffle-right { 0% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } 50% { transform: translate3d(60px, 10px, -20px) rotate(12deg); z-index: 8; } 100% { transform: translate3d(0, 0, 0) rotate(0deg); z-index: 10; } }
.shuffling-l { animation: shuffle-left 0.7s cubic-bezier(0.25, 0.8, 0.5, 1) infinite; }
.shuffling-r { animation: shuffle-right 0.7s cubic-bezier(0.25, 0.8, 0.5, 1) infinite; }

/* ── DYNAMIC CARDS ── */
.card-wrap { perspective: 1200px; transition: transform 1.2s cubic-bezier(0.23, 1, 0.32, 1); }
.card { width: calc(148px * var(--c-scale)); height: calc(258px * var(--c-scale)); position: relative; transform-style: preserve-3d; transition: transform 1s cubic-bezier(.23,1,.32,1), filter 1s ease, opacity 1s ease; cursor: pointer; }
.card.flipped { transform: rotateX(180deg); }
.card.flipped.rev { transform: rotateX(180deg) rotateZ(180deg); }
.card-back, .card-front { position: absolute; inset: 0; border-radius: 8px; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
.card-back { background: linear-gradient(160deg,#12101e,#0d0b16); border: 1px solid rgba(200,164,90,.22); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.card-back svg { position: absolute; width: 88%; height: 88%; opacity: .1; }
.card-back::before { content: ''; position: absolute; inset: 7px; border: 1px solid rgba(200,164,90,.09); border-radius: 5px; }
.tap-hint { position: absolute; bottom: calc(13px * var(--c-scale)); font-family: 'Cinzel', serif; font-size: calc(8px * var(--c-scale)); letter-spacing: .35em; color: rgba(200,164,90,.38); text-transform: uppercase; animation: breathe 2.8s ease-in-out infinite; }
@keyframes breathe { 0%, 100% { opacity: .3; } 50% { opacity: 1; } }

.card-front { background: linear-gradient(170deg,#f0e4c8,#e4d4a8); border: 1px solid var(--gold-dim); transform: rotateX(-180deg); display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: calc(15px * var(--c-scale)) calc(11px * var(--c-scale)); color: #1a1208; }
.card-front::before { content: ''; position: absolute; inset: 5px; border: 1px solid rgba(100,80,30,.14); border-radius: 5px; pointer-events: none; }
.cnum { font-family: 'Cinzel', serif; font-size: calc(8px * var(--c-scale)); letter-spacing: .2em; color: rgba(100,80,30,.48); align-self: flex-start; }
.cglyph { font-size: calc(58px * var(--c-scale)); line-height: 1; filter: drop-shadow(0 4px 10px rgba(0,0,0,.14)); }
.cname { font-family: 'Onryou', 'Cinzel', serif; font-size: calc(11px * var(--c-scale)); letter-spacing: .1em; text-align: center; color: #2a1e08; line-height: 1.5; }
.crev { font-family: 'Onryou', serif; font-size: calc(10px * var(--c-scale)); color: var(--ember); font-style: italic; letter-spacing: .15em; }

/* ── THE ANOMALY ── */
.card.broken .card-front { background: linear-gradient(170deg,#1a0505,#0a0000); border-color: var(--ember); color: #fff; box-shadow: 0 0 20px rgba(140,42,42,0.5); }
.card.broken .cglyph, .card.broken .cname, .card.broken .cnum { color: var(--ember); text-shadow: 2px 0 0 #00f, -2px 0 0 #f00; animation: jitter 0.2s infinite; }
@keyframes jitter { 0%{transform:translate(0,0)} 25%{transform:translate(1px,-1px)} 50%{transform:translate(-1px,1px)} 75%{transform:translate(-2px,0)} 100%{transform:translate(1px,1px)} }
.card.burning { filter: sepia(1) hue-rotate(-50deg) saturate(5) brightness(0.4) contrast(2) blur(4px); opacity: 0; transform: rotateX(-180deg) scale(0.8) translateY(-20px) !important; }

/* ── INLINE READING ── */
.inline-reading { width: 100%; max-width: calc(180px * var(--c-scale)); opacity: 0; transform: translateY(10px); transition: opacity .8s ease, transform .8s ease; pointer-events: none; margin-top: 15px; text-align: center; }
.inline-reading.show { opacity: 1; transform: translateY(0); pointer-events: all; }
.inline-card-name { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: .12em; margin-bottom: 2px; }
.inline-tradition { font-size: 8px; letter-spacing: .2em; color: rgba(120,60,180,.62); font-family: 'Cinzel', serif; text-transform: uppercase; margin-bottom: 8px; }
.three-lines { font-size: 11px; line-height: 1.6; color: var(--cream); font-style: italic; font-weight: 300; }
.three-lines p { margin: 0; padding: 1px 0; }

/* ── SYNTHESIS ── */
.synthesis-block { width: 100%; max-width: 560px; opacity: 0; transform: translateY(16px); transition: opacity 1s cubic-bezier(0.23, 1, 0.32, 1), transform 1s cubic-bezier(0.23, 1, 0.32, 1); pointer-events: none; margin-top: 15px; }
.synthesis-block.show { opacity: 1; transform: translateY(0); pointer-events: all; }
.synthesis-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: .45em; color: var(--gold-dim); text-transform: uppercase; text-align: center; margin-bottom: 12px; }
.synthesis-text { font-family: 'IPAexMincho', 'Cormorant Garamond', serif; font-size: 14px; line-height: 1.8; color: var(--cream); font-weight: 300; font-style: italic; text-align: center; }
.loaded { animation: fadeUp .7s ease forwards; }
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.synthesis-paragraph{margin-bottom:16px;opacity:0;transform:translateY(15px);transition:opacity 1s cubic-bezier(.23,1,.32,1),transform 1s cubic-bezier(.23,1,.32,1);}
.synthesis-paragraph.visible{opacity:1;transform:translateY(0);}
.etch-cursor{color:var(--gold);animation:ecur .6s ease-in-out infinite alternate;}
@keyframes ecur{from{opacity:.4;text-shadow:none}to{opacity:1;text-shadow:0 0 8px var(--gold),0 0 20px rgba(200,164,90,.4)}}
.etch-ghost{color:var(--gold);text-shadow:0 0 12px rgba(200,164,90,.7);opacity:.85;font-style:italic;}
.etch-word{color:var(--gold);text-shadow:0 0 10px rgba(200,164,90,.5);animation:esettle 1.8s ease forwards;}
@keyframes esettle{0%{color:var(--gold);text-shadow:0 0 18px rgba(200,164,90,.9)}70%{color:#e8cca0;text-shadow:0 0 4px rgba(200,164,90,.2)}100%{color:var(--cream);text-shadow:none}}

.inline-actions { opacity: 0; animation: fadeReveal 1.2s ease 0.6s forwards; display: block; margin-top: 10px; }
.inline-action { color: rgba(200,164,90,.6); cursor: pointer; text-decoration: underline; text-underline-offset: 4px; font-style: italic; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: .1em; transition: color .3s, text-shadow .3s; }
.inline-action:hover { color: var(--gold); text-shadow: 0 0 10px rgba(200,164,90,.5); }
@keyframes fadeReveal { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* ── COMPRESSION ── */
@media (max-width: 1023px) { :root { --c-scale: 0.65; } .spread-row { gap: 10px; } }
@media (max-width: 480px) { :root { --c-scale: 0.55; } h1 { font-size: 18px; } .synthesis-text { font-size: 13px; } .inline-reading { max-width: 100px; } }
</style>
</head>
<body>

<div id="introScreen" class="intro-screen" onclick="dismissIntro()">
  <div class="theater-backdrop"></div>
  <div class="chimera-vessel"></div>
  <div class="deka-insignia"></div>
  
  <div class="o-deka">
    <span>Deka,</span><span>o</span><span>Deka</span>
  </div>

  <div class="latin-stack">
    <span>Scientia</span><span>Sicut</span><span>Papilio</span><span>In Lunae</span><span>Splendore</span><span>Vivit</span><span>In Eius</span><span>Defectu</span><span>Moritur</span>
  </div>
</div>

<div class="stars" id="stars"></div>
<canvas id="constellationCanvas" class="stars-canvas"></canvas>

<div class="screen" id="intakeScreen">
  <div class="intake-title">Lunarot</div>
  <div class="intake-sub">enter the coordinates of your arrival</div>
  <div class="geo"><div class="geo-line"></div><div class="geo-sym">✦</div><div class="geo-line r"></div></div>

  <div class="field-group">
    <label class="field-label" for="dobInput">Date of Birth</label>
    <input type="date" id="dobInput"/>
  </div>

  <div class="field-group">
    <label class="field-label" for="timeInput">Time of Birth &nbsp;<span style="color:rgba(200,164,90,.38);font-style:italic;font-size:9px;letter-spacing:.06em;">(optional)</span></label>
    <input type="time" id="timeInput"/>
  </div>

  <div class="field-group">
    <label class="field-label" for="nameInput">Your Name &nbsp;<span style="color:rgba(200,164,90,.38);font-style:italic;font-size:9px;letter-spacing:.06em;">(optional)</span></label>
    <input type="text" id="nameInput" placeholder="or leave it to the void" maxlength="40"/>
  </div>

  <button class="submit-btn" onclick="submitIntake()">✦ Begin the Draw ✦</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="main-screen hidden" id="mainScreen">
  <div class="oracle-left">
    <div class="eyebrow" id="chartEyebrow">☽ · ✦ · ♄</div>
    <h1>The Sacred Draw</h1>
    <div class="sub">past · present · future</div>

    <div class="geo" style="width:100%;margin:10px 0 15px;">
      <div class="geo-line"></div><div class="geo-sym">✡ · ☽ · 𓂀 · ✦ · 卍</div><div class="geo-line r"></div>
    </div>

    <div class="chart-label" id="chartLabel">Natal Chart</div>
    <div class="chart-desc" id="chartDesc"></div>

    <div class="synthesis-block" id="synthesisBlock">
      <div class="synthesis-label">✦ The Confluence ✦</div>
      <div class="synthesis-text" id="synthesisText"></div>
    </div>
  </div>

  <div class="oracle-right">
    <div id="shuffleStage">
      <div class="shuffle-card shuffling-l"></div>
      <div class="shuffle-card shuffling-r" style="animation-delay: 0.1s"></div>
      <div class="shuffle-card shuffling-l" style="animation-delay: 0.2s"></div>
    </div>
    <div class="spread-row" id="spreadRow"></div>
  </div>
</div>

<script>
// ── INTRO SEQUENCE ─────────────────────────────────────────
let introDismissed = false;
function dismissIntro() {
  if(introDismissed) return;
  introDismissed = true;
  const intro = document.getElementById('introScreen');
  intro.style.opacity = '0';
  setTimeout(() => { intro.style.display = 'none'; }, 1500);
}

function toJD(year,month,day,hour=12){ const a=Math.floor((14-month)/12),y=year+4800-a,m=month+12*a-3; const JDN=day+Math.floor((153*m+2)/5)+365*y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)-32045; return JDN+(hour-12)/24; }
function getMoonSign(jd){ const REF_JD=2451549.5,REF_SIGN=9,LUNAR=29.530589,SIGN_DAYS=LUNAR/12; const offset=Math.floor((jd-REF_JD)/SIGN_DAYS)%12; return((REF_SIGN+offset)%12+12)%12; }

function drawConstellation() {
  cCtx.clearRect(0, 0, cw, ch); t0 += 0.0015;
  const cx = cw / 2, cy = ch / 2, rx = cw * 0.45, ry = ch * 0.45, activeNodes = [];

  NATAL_PLANETS.forEach(p => {
    const isActive = activePlanets.has(p.name), driftDeg = p.deg + (t0 * 15), rad = (driftDeg - 90) * Math.PI / 180;
    const px = cx + rx * Math.cos(rad), py = cy + ry * Math.sin(rad);
    if (isActive) activeNodes.push({ x: px, y: py, color: p.color });
    const alpha = isActive ? 0.9 : 0.15, size = isActive ? 3 : 1.5;
    
    cCtx.beginPath(); cCtx.arc(px, py, size, 0, Math.PI * 2); cCtx.fillStyle = `rgba(${hexToRgb(p.color)}, ${alpha})`; cCtx.fill();
    if (isActive) { cCtx.font = '12px "Cormorant Garamond", serif'; cCtx.fillStyle = `rgba(${hexToRgb(p.color)}, 0.8)`; cCtx.textAlign = 'center'; cCtx.fillText(p.symbol, px, py - 12); }
  });

  if (activeNodes.length > 1) {
    cCtx.beginPath(); cCtx.moveTo(activeNodes[0].x, activeNodes[0].y);
    for (let i = 1; i < activeNodes.length; i++) cCtx.lineTo(activeNodes[i].x, activeNodes[i].y);
    if (activeNodes.length > 2) cCtx.lineTo(activeNodes[0].x, activeNodes[0].y);
    const pulse = 0.15 + 0.15 * Math.sin(Date.now() / 800);
    cCtx.strokeStyle = `rgba(200, 164, 90, ${pulse})`; cCtx.lineWidth = 1; cCtx.setLineDash([4, 8]); cCtx.stroke(); cCtx.setLineDash([]);
  }
  animFrame = requestAnimationFrame(drawConstellation);
}

    unit.innerHTML = createCardHTML(card, i);
    unit.style.opacity = 1;
    
    const newEl = document.getElementById(`card-${i}`);
    await msDelay(400);
    newEl.classList.add('flipped'); 
    if(card.reversed) newEl.classList.add('rev'); 
    newEl.style.cursor='default';
  }
  
  drawnCards.push(card); 
  activateConj(card.name);
  setTimeout(()=>renderLines(i), 700);
}

function renderLines(i){
  const card=deck[i];
  document.getElementById(`inline-${i}`).classList.add('show');
  const signs=[NATAL_USER.sun, NATAL_USER.moon, NATAL_USER.rising||NATAL_USER.sun];
  const linesEl=document.getElementById(`lines-${i}`);
  linesEl.innerHTML=signs.map(s=>`<p>${makeLine(s,card.name,card.reversed)}</p>`).join('');
  linesEl.classList.add('loaded');
  if(drawnCards.length === 3) setTimeout(renderSynthesis,500);
}

// ── ADJECTIVE DETECTION ──
var ALL_ADJ_SET = null;
function getAllAdjs(){
  if(ALL_ADJ_SET) return ALL_ADJ_SET;
  ALL_ADJ_SET = {};
  Object.values(SIGN_ADJ).forEach(arr => arr.forEach(w => ALL_ADJ_SET[w]=1));
  Object.values(CARD_ADJ).forEach(arr => arr.forEach(w => ALL_ADJ_SET[w]=1));
  return ALL_ADJ_SET;
}
function isCharged(word){
  var clean=word.toLowerCase().replace(/[^a-z-]/g,'');
  var adjs=getAllAdjs();
  if(adjs[clean]) return true;
  if(clean.indexOf('-')>-1 && clean.length>5) return true;
  return false;
}

var ARABIC="ابتثجحخدذرزسشصضطظعغفقكلمنهوي";
function randArabic(){ return ARABIC[Math.floor(Math.random()*ARABIC.length)]; }
function msDelay(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function etchParagraph(el, text){
  el.classList.add('visible'); el.innerHTML='';
  var words=text.split(' '), rendered='';
  for(var w=0;w<words.length;w++){
    var word=words[w], clean=word.toLowerCase().replace(/[^a-z-]/g,''), charged=isCharged(clean);
    if(charged){
      el.innerHTML=rendered+'<span class="etch-cursor">▌</span>'; await msDelay(160+Math.floor(Math.random()*120));
      var flickCount=6+Math.floor(Math.random()*6);
      for(var f=0;f<flickCount;f++){
        var ghost=word.split('').map(c=>c.match(/[a-zA-Z]/)?randArabic():c).join('');
        el.innerHTML=rendered+'<span class="etch-ghost">'+ghost+'</span><span class="etch-cursor">▌</span>';
        await msDelay(32+Math.floor(Math.random()*28));
      }
      el.innerHTML=rendered+'<span class="etch-ghost">'+word+'</span><span class="etch-cursor">▌</span>'; await msDelay(80+Math.floor(Math.random()*60));
      rendered+='<span class="etch-word">'+word+'</span> '; el.innerHTML=rendered+'<span class="etch-cursor">▌</span>'; await msDelay(50+Math.floor(Math.random()*40));
    } else {
      rendered+=word+' '; el.innerHTML=rendered+'<span class="etch-cursor">▌</span>';
      if(word.match(/[,;:—]/)) await msDelay(100+Math.floor(Math.random()*80));
      else if(word.match(/[.!?]$/)){ el.innerHTML=rendered; await msDelay(480+Math.floor(Math.random()*200)); el.innerHTML=rendered+'<span class="etch-cursor">▌</span>'; await msDelay(60); }
      else await msDelay(16+Math.floor(Math.random()*12));
    }
  }
  el.innerHTML=rendered.trim();
}

async function renderSynthesis(){
  var syn=document.getElementById('synthesisBlock'), container=document.getElementById('synthesisText');
  syn.classList.add('show'); container.innerHTML='';
  var paragraphs=makeSynthesisParagraphs(NATAL_USER,drawnCards);
  
  var paraEls=paragraphs.map(function(text){
    var p=document.createElement('div'); p.className='synthesis-paragraph visible'; p.innerHTML=text;
    container.appendChild(p); return p;
  });

  const actionsHTML = ` <span class="inline-action" onclick="startRitual()">✦ draw again?</span> <span style="color:var(--gold-dim); margin:0 6px;">·</span> <span class="inline-action" onclick="resetToIntake()">change the date</span>`;
  const tempActions = document.createElement('span'); tempActions.className = 'inline-actions'; tempActions.style.opacity = '1'; tempActions.innerHTML = actionsHTML;
  paraEls[paraEls.length - 1].appendChild(tempActions);

  paraEls.forEach((p, i) => { p.classList.remove('visible'); p.setAttribute('data-text', paragraphs[i]); p.innerHTML = ''; });

  await msDelay(800); 
  for (let i = 0; i < paraEls.length; i++) {
    await etchParagraph(paraEls[i], paraEls[i].getAttribute('data-text'));
    await msDelay(800); 
  }
  
  const activeActions = document.createElement('span'); activeActions.className = 'inline-actions'; activeActions.innerHTML = actionsHTML;
  paraEls[paraEls.length - 1].appendChild(activeActions);
}

function makeSynthesisParagraphs(natal, drawn){
  var single = makeSynthesis(natal, drawn);
  var a1=pick(CARD_ADJ[drawn[0].name]||['present']), a2=pick(CARD_ADJ[drawn[1].name]||['still']), a3=pick(CARD_ADJ[drawn[2].name]||['unnamed']);
  var sunAdj=pick(SIGN_ADJ[natal.sun]||['stone-built']), moonAdj=pick(SIGN_ADJ[natal.moon]||['oceanic']);
  var p2='The arc from '+drawn[0].name+' to '+drawn[2].name+' passes through '+drawn[1].name+'. '+a1+' becoming '+a2+', then '+a3+'. A '+sunAdj+' instinct meeting a '+moonAdj+' horizon. The chart already knew. The cards only confirmed it.';
  return [single, p2];
}
